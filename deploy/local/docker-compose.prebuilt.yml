services:
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    privileged: true
    restart: unless-stopped
    stop_grace_period: 30s
    shm_size: "512mb"
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb           # Google Coral USB (adjust for your hardware)
    #   - /dev/apex_0:/dev/apex_0             # Coral PCIe (requires drivers)
    #   - /dev/video11:/dev/video11           # RPi camera (example)
    #   - /dev/dri/renderD128:/dev/dri/renderD128 # Intel/AMD VAAPI (adjust path)
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config
      - ./storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "8971:8971"
      - "8554:8554"        # RTSP feeds
      - "8555:8555/tcp"    # WebRTC over TCP
      - "8555:8555/udp"    # WebRTC over UDP
    environment:
      FRIGATE_RTSP_PASSWORD: "password"

  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:2.0
    command: mosquitto -c /mosquitto-no-auth.conf # enable no-auth mode
    ports:
      - "1883:1883"

